name: blissful-soul
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env on the server}
      POSTGRES_DB: ${POSTGRES_DB:-medusa_db}
    # No ports exposed — reachable only within the Docker network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  redis:
    image: redis:7-alpine
    # No ports exposed — reachable only within the Docker network
    restart: always
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'

  backend:
    image: ghcr.io/${REPO_OWNER}/the-blissful-soul-backend:${IMAGE_TAG:-latest}
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-medusa_db}?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - BACKEND_URL=https://theblissfulsoul.in/api
    depends_on:
      - postgres
      - redis
    restart: always
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  storefront:
    image: ghcr.io/${REPO_OWNER}/the-blissful-soul-storefront:${IMAGE_TAG:-latest}
    environment:
      - MEDUSA_BACKEND_URL=http://backend:9000
      - STRAPI_URL=http://cms:1337
      - NEXT_PUBLIC_STRAPI_URL=https://theblissfulsoul.in/cms
    restart: always
    depends_on:
      backend:
        condition: service_healthy
      cms:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8001/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  cms:
    image: ghcr.io/${REPO_OWNER}/the-blissful-soul-cms:${IMAGE_TAG:-latest}
    volumes:
      - cms_data:/app/apps/cms/.tmp
      - ./apps/cms/public/uploads:/app/apps/cms/public/uploads
    restart: always
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:1337/admin/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
    depends_on:
      storefront:
        condition: service_healthy
      backend:
        condition: service_healthy
      cms:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.1'

volumes:
  postgres_data:
  cms_data:
  certbot-etc:
  certbot-var:
