name: blissful-soul
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env on the server}
      POSTGRES_DB: ${POSTGRES_DB:-medusa_db}
    # No ports exposed — reachable only within the Docker network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    # No ports exposed — reachable only within the Docker network
    restart: always
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: ghcr.io/${REPO_OWNER}/the-blissful-soul-backend:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379
      - BACKEND_URL=https://theblissfulsoul.in/api
      - BACKEND_JWT_SECRET=${BACKEND_JWT_SECRET}
      - BACKEND_COOKIE_SECRET=${BACKEND_COOKIE_SECRET}
      - BACKEND_CORS_ORIGIN=${BACKEND_CORS_ORIGIN}
      - STRAPI_URL=http://cms:1337
      - CMS_API_TOKEN=${CMS_API_TOKEN}
      - MEDUSA_ADMIN_ONBOARDING_TYPE=nextjs
      - MEDUSA_ADMIN_ONBOARDING_NEXTJS_DIRECTORY=storefront
      - RAZORPAY_ID=${RAZORPAY_ID}
      - RAZORPAY_SECRET=${RAZORPAY_SECRET}
      - RAZORPAY_ACCOUNT=${RAZORPAY_ACCOUNT}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET}
      - GOOGLE_SMTP_USER=${GOOGLE_SMTP_USER}
      - GOOGLE_SMTP_PASS=${GOOGLE_SMTP_PASS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:9000/health', (r) => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  storefront:
    image: ghcr.io/${REPO_OWNER}/the-blissful-soul-storefront:${IMAGE_TAG:-latest}
    environment:
      - STOREFRONT_MEDUSA_URL=http://backend:9000
      - STOREFRONT_STRAPI_URL=http://cms:1337
      - NEXT_PUBLIC_STRAPI_URL=https://theblissfulsoul.in/cms
      - STRAPI_API_TOKEN=${CMS_API_TOKEN}
    restart: always
    depends_on:
      backend:
        condition: service_healthy
      cms:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000/', (r) => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  cms:
    image: ghcr.io/${REPO_OWNER}/the-blissful-soul-cms:${IMAGE_TAG:-latest}
    environment:
      - CMS_APP_KEYS=${CMS_APP_KEYS}
      - CMS_API_TOKEN_SALT=${CMS_API_TOKEN_SALT}
      - CMS_ADMIN_JWT_SECRET=${CMS_ADMIN_JWT_SECRET}
      - CMS_TRANSFER_TOKEN_SALT=${CMS_TRANSFER_TOKEN_SALT}
      - CMS_ENCRYPTION_KEY=${CMS_ENCRYPTION_KEY}
      - CMS_JWT_SECRET=${CMS_JWT_SECRET}
      - CMS_DATABASE_CLIENT=sqlite
      - CMS_DATABASE_FILENAME=.tmp/data.db
    volumes:
      - cms_data:/app/apps/cms/.tmp
      - ./apps/cms/public/uploads:/app/apps/cms/public/uploads
    restart: always
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:1337/_health', (r) => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
    depends_on:
      storefront:
        condition: service_healthy
      backend:
        condition: service_healthy
      cms:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.1'

volumes:
  postgres_data:
  cms_data:
  certbot-etc:
  certbot-var:
