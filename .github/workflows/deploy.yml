name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Point 1: Least Privilege - Disable all permissions globally
permissions: {}

# Point 5: Prevent concurrent deployments
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Point: Max job duration
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false # Point 9: Don't kill other builds if one fails
      matrix:
        app: [backend, storefront, cms]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/the-blissful-soul-${{ matrix.app }}:latest
            ghcr.io/${{ github.repository_owner }}/the-blissful-soul-${{ matrix.app }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_STRAPI_URL=${{ secrets.NEXT_PUBLIC_STRAPI_URL }}
            NEXT_PUBLIC_CAL_API_KEY=${{ secrets.NEXT_PUBLIC_CAL_API_KEY }}
            NEXT_PUBLIC_CAL_USERNAME=${{ secrets.NEXT_PUBLIC_CAL_USERNAME }}
            NEXT_PUBLIC_CAL_EVENT_SLUG=${{ secrets.NEXT_PUBLIC_CAL_EVENT_SLUG }}
            NEXT_PUBLIC_RAZORPAY_KEY=${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Point: Max job duration
    environment: production
    permissions:
      contents: read # Required for actions/checkout to get config files
      packages: read # Required for docker login to pull images from GHCR
    steps:
      - name: Checkout code (for config files)
        uses: actions/checkout@v4

      - name: Copy config files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,nginx/"
          target: "app" # Relative to $HOME

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
          APP_KEYS: ${{ secrets.APP_KEYS }}
          API_TOKEN_SALT: ${{ secrets.API_TOKEN_SALT }}
          ADMIN_JWT_SECRET: ${{ secrets.ADMIN_JWT_SECRET }}
          TRANSFER_TOKEN_SALT: ${{ secrets.TRANSFER_TOKEN_SALT }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_REPOSITORY_OWNER,GITHUB_SHA,GITHUB_ACTOR,POSTGRES_PASSWORD,POSTGRES_USER,POSTGRES_DB,STRAPI_API_TOKEN,APP_KEYS,API_TOKEN_SALT,ADMIN_JWT_SECRET,TRANSFER_TOKEN_SALT,ENCRYPTION_KEY,JWT_SECRET
          script: |
            set -euo pipefail

            # Point: Explicit project scoping and portable paths
            export COMPOSE_PROJECT_NAME=blissful-soul
            export APP_DIR="$HOME/app"
            export REPO_OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
            export IMAGE_TAG="${GITHUB_SHA}"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # Write secrets to .env from GitHub Actions secrets (regenerated on every deploy)
            cat > .env <<EOF
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_USER=${POSTGRES_USER:-postgres}
            POSTGRES_DB=${POSTGRES_DB:-medusa_db}
            STRAPI_API_TOKEN=${STRAPI_API_TOKEN}
            APP_KEYS=${APP_KEYS}
            API_TOKEN_SALT=${API_TOKEN_SALT}
            ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
            TRANSFER_TOKEN_SALT=${TRANSFER_TOKEN_SALT}
            ENCRYPTION_KEY=${ENCRYPTION_KEY}
            JWT_SECRET=${JWT_SECRET}
            EOF
            chmod 600 .env

            # Token hygiene (off-disk via stdin)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            
            # Rollback Prep
            echo "Backing up current images..."
            for app in backend storefront cms; do
              IMAGE_BASE="ghcr.io/$REPO_OWNER/the-blissful-soul-$app"
              if docker image inspect "$IMAGE_BASE:latest" >/dev/null 2>&1; then
                docker tag "$IMAGE_BASE:latest" "$IMAGE_BASE:previous"
              fi
            done
            
            echo "Pulling latest images..."
            docker compose -f docker-compose.prod.yml pull
            
            echo "Deploying version $IMAGE_TAG..."
            # Point: Healthcheck-aware startup (--wait) and clean orchestration
            if ! docker compose -f docker-compose.prod.yml up -d --wait --wait-timeout 120 --remove-orphans; then
              echo "Deployment failed health checks! Initiating rollback..."
              HAS_PREVIOUS=true
              for app in backend storefront cms; do
                IMAGE_BASE="ghcr.io/$REPO_OWNER/the-blissful-soul-$app"
                if ! docker image inspect "$IMAGE_BASE:previous" >/dev/null 2>&1; then
                  HAS_PREVIOUS=false
                  break
                fi
              done
              if [ "$HAS_PREVIOUS" = "true" ]; then
                export IMAGE_TAG="previous"
                docker compose -f docker-compose.prod.yml up -d
              else
                echo "No previous images available for rollback (first deploy). Manual intervention required."
              fi
              exit 1
            fi
            
            # Robust Health Check (Version-agnostic jq parsing)
            echo "Performing final health verification..."
            PERSISTENT_SERVICES=("backend" "storefront" "cms" "nginx" "postgres" "redis")
            
            for service in "${PERSISTENT_SERVICES[@]}"; do
              # Point: Use jq -s to handle both single objects and arrays for maximum compatibility
              STATE=$(docker compose -f docker-compose.prod.yml ps --format json "$service" | jq -s -r 'if type=="array" then .[0] else . end | .State // empty')
              if [ "$STATE" != "running" ]; then
                echo "Error: Service $service is in state '$STATE' (expected 'running')"
                docker compose -f docker-compose.prod.yml logs "$service" --tail 30
                
                echo "Initiating emergency rollback..."
                HAS_PREVIOUS=true
                for app in backend storefront cms; do
                  IMAGE_BASE="ghcr.io/$REPO_OWNER/the-blissful-soul-$app"
                  if ! docker image inspect "$IMAGE_BASE:previous" >/dev/null 2>&1; then
                    HAS_PREVIOUS=false
                    break
                  fi
                done
                if [ "$HAS_PREVIOUS" = "true" ]; then
                  export IMAGE_TAG="previous"
                  docker compose -f docker-compose.prod.yml up -d
                else
                  echo "No previous images available for rollback (first deploy). Manual intervention required."
                fi
                exit 1
              fi
            done
            
            echo "Deployment successful."
            docker logout ghcr.io
            
            # Point: Project-Scoped image pruning
            docker image prune -f --filter "label=com.docker.compose.project=blissful-soul"
