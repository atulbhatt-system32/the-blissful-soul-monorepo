name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Point 1: Least Privilege - Disable all permissions globally
permissions: {}

# Point 5: Prevent concurrent deployments
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      apps: ${{ steps.set-apps.outputs.apps }}
      any_changed: ${{ steps.set-apps.outputs.any_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed apps
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
            storefront:
              - 'apps/storefront/**'
            cms:
              - 'apps/cms/**'
            global:
              - '.github/workflows/deploy.yml'
              - 'docker-compose.prod.yml'
              - 'nginx/**'

      - name: Set apps matrix
        id: set-apps
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.filter.outputs.global }}" = "true" ]; then
            echo "Force deploying all apps due to manual trigger or global config change."
            echo 'apps=["backend","storefront","cms"]' >> $GITHUB_OUTPUT
            echo 'any_changed=true' >> $GITHUB_OUTPUT
          else
            APPS='${{ steps.filter.outputs.changes }}'
            # Remove 'global' from the changes list if it exists to avoid matrix errors
            echo "Apps to deploy: $APPS"
            echo "apps=$APPS" >> $GITHUB_OUTPUT
            if [ "$APPS" = "[]" ] || [ -z "$APPS" ]; then
              echo 'any_changed=false' >> $GITHUB_OUTPUT
            else
              echo 'any_changed=true' >> $GITHUB_OUTPUT
            fi
          fi

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Point: Max job duration
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false # Point 9: Don't kill other builds if one fails
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.apps) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/the-blissful-soul-${{ matrix.app }}:latest
            ghcr.io/${{ github.repository_owner }}/the-blissful-soul-${{ matrix.app }}:${{ github.sha }}
          build-args: |
            ${{ matrix.app == 'storefront' && format('NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY={0}', secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY) || '' }}
            ${{ matrix.app == 'storefront' && format('NEXT_PUBLIC_STRAPI_URL=https://cms.{0}', secrets.DOMAIN) || '' }}
            ${{ matrix.app == 'storefront' && format('NEXT_PUBLIC_CAL_API_KEY={0}', secrets.NEXT_PUBLIC_CAL_API_KEY) || '' }}
            ${{ matrix.app == 'storefront' && format('NEXT_PUBLIC_CAL_USERNAME={0}', secrets.NEXT_PUBLIC_CAL_USERNAME) || '' }}
            ${{ matrix.app == 'storefront' && format('NEXT_PUBLIC_CAL_EVENT_SLUG={0}', secrets.NEXT_PUBLIC_CAL_EVENT_SLUG) || '' }}
            ${{ matrix.app == 'storefront' && format('NEXT_PUBLIC_RAZORPAY_KEY={0}', secrets.RAZORPAY_ID) || '' }}
            ${{ matrix.app == 'storefront' && format('NEXT_PUBLIC_MEDUSA_BACKEND_URL=https://backend.{0}', secrets.DOMAIN) || '' }}
            ${{ matrix.app == 'cms' && format('CMS_PUBLIC_URL=https://cms.{0}', secrets.DOMAIN) || '' }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/the-blissful-soul-${{ matrix.app }}:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/the-blissful-soul-${{ matrix.app }}:cache,mode=max,image-manifest=true,oci-mediatypes=true

  deploy:
    needs: [detect-changes, build-and-push]
    if: needs.detect-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Point: Max job duration
    environment: production
    permissions:
      contents: read # Required for actions/checkout to get config files
      packages: read # Required for docker login to pull images from GHCR
    steps:
      - name: Checkout code (for config files)
        uses: actions/checkout@v4

      - name: Copy config files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,nginx/"
          target: "app" # Relative to $HOME

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          BACKEND_JWT_SECRET: ${{ secrets.BACKEND_JWT_SECRET }}
          BACKEND_COOKIE_SECRET: ${{ secrets.BACKEND_COOKIE_SECRET }}
          DOMAIN: ${{ secrets.DOMAIN }}
          CMS_API_TOKEN: ${{ secrets.CMS_API_TOKEN }}
          CMS_APP_KEYS: ${{ secrets.CMS_APP_KEYS }}
          CMS_API_TOKEN_SALT: ${{ secrets.CMS_API_TOKEN_SALT }}
          CMS_ADMIN_JWT_SECRET: ${{ secrets.CMS_ADMIN_JWT_SECRET }}
          CMS_TRANSFER_TOKEN_SALT: ${{ secrets.CMS_TRANSFER_TOKEN_SALT }}
          CMS_ENCRYPTION_KEY: ${{ secrets.CMS_ENCRYPTION_KEY }}
          CMS_JWT_SECRET: ${{ secrets.CMS_JWT_SECRET }}
          RAZORPAY_ID: ${{ secrets.RAZORPAY_ID }}
          RAZORPAY_SECRET: ${{ secrets.RAZORPAY_SECRET }}
          RAZORPAY_ACCOUNT: ${{ secrets.RAZORPAY_ACCOUNT }}
          RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
          GOOGLE_SMTP_USER: ${{ secrets.GOOGLE_SMTP_USER }}
          GOOGLE_SMTP_PASS: ${{ secrets.GOOGLE_SMTP_PASS }}
          ADMIN_NOTIFICATION_EMAIL: ${{ secrets.ADMIN_NOTIFICATION_EMAIL }}
          CHANGED_APPS: ${{ needs.detect-changes.outputs.apps }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_REPOSITORY_OWNER,GITHUB_SHA,GITHUB_ACTOR,POSTGRES_PASSWORD,POSTGRES_USER,POSTGRES_DB,BACKEND_JWT_SECRET,BACKEND_COOKIE_SECRET,DOMAIN,CMS_API_TOKEN,CMS_APP_KEYS,CMS_API_TOKEN_SALT,CMS_ADMIN_JWT_SECRET,CMS_TRANSFER_TOKEN_SALT,CMS_ENCRYPTION_KEY,CMS_JWT_SECRET,RAZORPAY_ID,RAZORPAY_SECRET,RAZORPAY_ACCOUNT,RAZORPAY_WEBHOOK_SECRET,GOOGLE_SMTP_USER,GOOGLE_SMTP_PASS,ADMIN_NOTIFICATION_EMAIL,CHANGED_APPS
          script: |
            set -euo pipefail

            # Parse changed apps into a space-separated string
            APPS=$(echo "$CHANGED_APPS" | jq -r 'join(" ")')
            echo "Apps to process: $APPS"

            do_rollback() {
              local FAILED_TAG="$IMAGE_TAG"
              local HAS_PREVIOUS=true
              
              for app in $APPS; do
                IMAGE_BASE="ghcr.io/$REPO_OWNER/the-blissful-soul-$app"
                if ! docker image inspect "$IMAGE_BASE:previous" >/dev/null 2>&1; then
                  HAS_PREVIOUS=false
                  break
                fi
              done

              if [ "$HAS_PREVIOUS" = "true" ]; then
                echo "Initiating scoped rollback for: $APPS"
                export IMAGE_TAG="previous"
                docker compose -f docker-compose.prod.yml up -d --no-deps $APPS
              else
                echo "No previous images available for scoped rollback. Manual intervention required."
              fi

              echo "Removing failed images for tag $FAILED_TAG..."
              for app in $APPS; do
                docker image rm -f "ghcr.io/$REPO_OWNER/the-blissful-soul-$app:$FAILED_TAG" 2>/dev/null || true
              done
              exit 1
            }

            export COMPOSE_PROJECT_NAME=blissful-soul
            export APP_DIR="$HOME/app"
            export REPO_OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
            export IMAGE_TAG="${GITHUB_SHA}"
            export REPO_ACTOR=$(echo "${GITHUB_ACTOR}" | tr '[:upper:]' '[:lower:]')

            # Pre-flight connectivity check
            echo "Checking connectivity to GitHub Container Registry..."
            if ! curl -Is --connect-timeout 10 https://ghcr.io/v2/ > /dev/null; then
              echo "Error: Cannot reach ghcr.io. Your server might have network issues or be blocking GitHub."
              # We don't exit here, we try to continue, but this provides a better error log.
            fi

            mkdir -p "$APP_DIR"
            # Pre-create bind-mount directories if they don't exist.
            # Docker Compose creates missing directories as root, which blocks writes from the container's node user.
            # We only act on fresh directories — existing ones already have correct ownership from prior runs.
            for dir in "$APP_DIR/apps/backend/static" "$APP_DIR/apps/cms/public/uploads"; do
              if [ ! -d "$dir" ]; then
                mkdir -p "$dir"
                chmod 777 "$dir"
              fi
            done
            cd "$APP_DIR"

            # Write secrets to .env
            cat > .env <<EOF
            DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-medusa_db}?sslmode=disable
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_USER=${POSTGRES_USER:-postgres}
            POSTGRES_DB=${POSTGRES_DB:-medusa_db}
            POSTGRES_HOST=postgres
            POSTGRES_PORT=5432
            REPO_OWNER=${REPO_OWNER}
            IMAGE_TAG=${IMAGE_TAG}
            BACKEND_JWT_SECRET=${BACKEND_JWT_SECRET}
            BACKEND_COOKIE_SECRET=${BACKEND_COOKIE_SECRET}
            DOMAIN=${DOMAIN}
            BACKEND_CORS_ORIGIN=https://${DOMAIN},https://backend.${DOMAIN}
            CMS_PUBLIC_URL=https://cms.${DOMAIN}
            CMS_API_TOKEN=${CMS_API_TOKEN}
            CMS_APP_KEYS=${CMS_APP_KEYS}
            CMS_API_TOKEN_SALT=${CMS_API_TOKEN_SALT}
            CMS_ADMIN_JWT_SECRET=${CMS_ADMIN_JWT_SECRET}
            CMS_TRANSFER_TOKEN_SALT=${CMS_TRANSFER_TOKEN_SALT}
            CMS_ENCRYPTION_KEY=${CMS_ENCRYPTION_KEY}
            CMS_JWT_SECRET=${CMS_JWT_SECRET}
            RAZORPAY_ID=${RAZORPAY_ID}
            RAZORPAY_SECRET=${RAZORPAY_SECRET}
            RAZORPAY_ACCOUNT=${RAZORPAY_ACCOUNT}
            RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET}
            GOOGLE_SMTP_USER=${GOOGLE_SMTP_USER}
            GOOGLE_SMTP_PASS=${GOOGLE_SMTP_PASS}
            ADMIN_NOTIFICATION_EMAIL=${ADMIN_NOTIFICATION_EMAIL}
            EOF
            chmod 600 .env

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "$REPO_ACTOR" --password-stdin
            
            echo "Backing up current images for changed apps..."
            for app in $APPS; do
              IMAGE_BASE="ghcr.io/$REPO_OWNER/the-blissful-soul-$app"
              if docker image inspect "$IMAGE_BASE:latest" >/dev/null 2>&1; then
                docker tag "$IMAGE_BASE:latest" "$IMAGE_BASE:previous"
              fi
            done
            
            echo "Pulling images for: $APPS (with retries)"
            for i in 1 2 3; do
              if docker compose -f docker-compose.prod.yml pull $APPS; then
                break
              fi
              echo "Pull failed, retrying in 10 seconds... ($i/3)"
              sleep 10
            done

            echo "Deploying version $IMAGE_TAG for services: $APPS"
            if ! docker compose -f docker-compose.prod.yml up -d --wait --wait-timeout 600 --no-deps $APPS; then
              echo "Deployment failed health checks! Initiating rollback..."
              do_rollback
            fi
            
            echo "Performing final health verification..."
            for service in $APPS; do
              STATE=$(docker compose -f docker-compose.prod.yml ps --format json "$service" | jq -s -r 'if type=="array" then .[0] else . end | .State // empty')
              if [ "$STATE" != "running" ]; then
                echo "Error: Service $service is in state '$STATE' (expected 'running')"
                docker compose -f docker-compose.prod.yml logs "$service" --tail 30
                echo "Initiating emergency rollback..."
                do_rollback
              fi
            done
            
            echo "Updating 'latest' tags for successfully deployed services..."
            for app in $APPS; do
              IMAGE_BASE="ghcr.io/$REPO_OWNER/the-blissful-soul-$app"
              docker tag "$IMAGE_BASE:$IMAGE_TAG" "$IMAGE_BASE:latest"
            done

            echo "Ensuring SSL certificates exist..."
            # Check for certificates for all three domains
            for d in "${DOMAIN}" "backend.${DOMAIN}" "cms.${DOMAIN}"; do
              if [ ! -f "/etc/letsencrypt/live/$d/fullchain.pem" ]; then
                echo "Generating initial certificate for $d..."
                docker compose -f docker-compose.prod.yml run --rm --entrypoint certbot certbot certonly --webroot \
                  -w /var/www/certbot \
                  -d "$d" \
                  --non-interactive --agree-tos --email admin@${DOMAIN}
              fi
            done

            echo "Recreating nginx to re-render template with current DOMAIN..."
            docker compose -f docker-compose.prod.yml up -d --force-recreate --no-deps nginx

            echo "Deployment successful."
            docker logout ghcr.io
