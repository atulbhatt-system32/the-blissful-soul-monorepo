services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medusa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    env_file:
      - ./apps/backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/medusa_db?sslmode=disable
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    command: sh -c "npx medusa db:migrate && npx medusa exec ./src/scripts/create-region.ts && npx medusa develop"
    volumes:
      - ./apps/backend:/app
      - /app/node_modules

  storefront:
    build:
      context: ./apps/storefront
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ./apps/storefront/.env
    environment:
      - MEDUSA_BACKEND_URL=http://backend:9000
      - STRAPI_URL=http://cms:1337
      - NEXT_PUBLIC_STRAPI_URL=http://localhost:1337
    depends_on:
      - backend
      - cms
    extra_hosts:
      - "localhost:host-gateway"
    volumes:
      - ./apps/storefront:/app
      - /app/node_modules

  cms:
    build:
      context: ./apps/cms
      dockerfile: Dockerfile
    ports:
      - "1337:1337"
    env_file:
      - ./apps/cms/.env
    volumes:
      - ./apps/cms/.tmp:/app/.tmp
      - ./apps/cms/public/uploads:/app/public/uploads

volumes:
  postgres_data:
