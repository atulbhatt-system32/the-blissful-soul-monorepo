version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medusa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/medusa_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    volumes:
      - ./apps/backend:/app
      - /app/node_modules

  storefront:
    build:
      context: ./apps/storefront
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - MEDUSA_BACKEND_URL=http://backend:9000
    depends_on:
      - backend
    volumes:
      - ./apps/storefront:/app
      - /app/node_modules

  cms:
    build:
      context: ./apps/cms
      dockerfile: Dockerfile
    ports:
      - "1337:1337"
    volumes:
      - ./apps/cms:/app
      - /app/node_modules

volumes:
  postgres_data:
