services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medusa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.dev
    ports:
      - "9000:9000"
    env_file:
      - ./apps/backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/medusa_db?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - BACKEND_URL=http://localhost:9000
      - BACKEND_CORS_ORIGIN=${PUBLIC_URL}:8001,${PUBLIC_URL}:5173,${PUBLIC_URL}:9000
    depends_on:
      - postgres
      - redis
    command: sh -c "npx medusa db:migrate && npx medusa develop"
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
      - ./apps/backend/static:/app/apps/backend/static

  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile.dev
    ports:
      - "8001:8001"
    env_file:
      - ./apps/storefront/.env
    environment:
      - STOREFRONT_MEDUSA_URL=http://backend:9000
      - STOREFRONT_STRAPI_URL=http://cms:1337
      - NEXT_PUBLIC_STRAPI_URL=http://localhost:1337
    depends_on:
      - backend
      - cms
    extra_hosts:
      - "localhost:host-gateway"
    volumes:
      - ./apps/storefront/src:/app/apps/storefront/src

  cms:
    build:
      context: .
      dockerfile: apps/cms/Dockerfile.dev
    ports:
      - "1337:1337"
    env_file:
      - ./apps/cms/.env
    volumes:
      - ./apps/cms/src:/app/apps/cms/src
      - cms_data:/app/apps/cms/.tmp
      - ./apps/cms/public/uploads:/app/apps/cms/public/uploads

volumes:
  postgres_data:
  cms_data:
